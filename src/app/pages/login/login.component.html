<div class="fluid p-2">

  <div class="w-full m-auto flex justify-content-center align-items-center my-3" style="height: 5rem;">
    <h1>Login Auth <i class="pi pi-lock text-3xl"></i></h1>
  </div>

  <div class="fluid p-2 w-10 m-auto my-4 text-center" >
    <h3>Bem vindo (a)</h3>
    <p>Acesse sua conta para continuar</p>
  </div>

  <div class="fluid p-2 w-10 max-w-30rem m-auto">
    <form [formGroup]="form">
      <div class="grid">
        <div class="field col-12">
          <p-floatlabel variant="over">
            <p-iconfield>
              <p-inputicon class="pi pi-user"></p-inputicon>
              <input type="text" pInputText id="email" formControlName="email" fluid>
            </p-iconfield>
            <label for="email">Email</label>
          </p-floatlabel>
        </div>
        <div class="field col-12" [hidden]="!form.get('email')?.value">
          <p-floatlabel variant="over">
            <p-iconfield>
              <p-inputicon class="pi pi-lock"></p-inputicon>
              <p-password id="password" inputId="password" formControlName="password" fluid [feedback]="false" showClear toggleMask></p-password>
            </p-iconfield>
            <label for="userName">Senha</label>
          </p-floatlabel>
        </div>
        <div class="field col-12 flex justify-content-between align-items-center text-sm">
          <div class="flex gap-2">
            <p-checkbox id="remindme" inputId="remindme" [binary]="true"></p-checkbox>
            <label for="remindme">Lembrar-me</label>
          </div>
          <div>
            <a href="#" class="no-underline text-primary">Esqueceu sua senha?</a>
          </div>
        </div>
        <div class="field col-12">
          <p-button label="Acessar" fluid size="large" severity="primary"></p-button>
        </div>
      </div>
    </form>
  </div>

  <div class="fluid w-10 max-w-30rem m-auto">
    <p-divider [align]="'center'">OU</p-divider>
  </div>

  <div class="fluid p-2 w-10 max-w-30rem m-auto">
    <p-button label="Criar conta" fluid size="large" severity="info" routerLink="/register"></p-button>
  </div>

  <div class="w-full m-auto flex justify-content-center align-items-center my-3" style="height: 5rem;">
    <p>Criado por <a href="#" class="no-underline text-primary">Gustavo Pilar</a></p>
  </div>

</div>
