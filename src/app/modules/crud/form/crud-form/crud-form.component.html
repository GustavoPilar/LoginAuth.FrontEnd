<p-toast></p-toast>
<p-confirmdialog #confirmDialog [key]="keyDialog" header="Retornar">
  <ng-template #message>
    <p>
      Deseja sair do formulário?<br>
      Todo progresso não será salvo.
    </p>
  </ng-template>
  <ng-template #footer let-dialog="dialog">
    <div class="w-full p-2 flex justify-content-between align-items-center">
      <p-button variant="text" label="Não" icon="pi pi-times" iconPos="right" severity="danger" rounded (onClick)="onReject()"></p-button>
      <p-button variant="text" label="Sim" icon="pi pi-check" severity="success" rounded (onClick)="onAccept()"></p-button>
    </div>
  </ng-template>
</p-confirmdialog>

<p-card>
  <ng-template #title>
    {{getDescription()}}
  </ng-template>
  <ng-template #content>
    <div class="w-full p-2">
      <div #crudForm></div>
    </div>
  </ng-template>
  <ng-template #footer>
    <div class="w-full p-2 flex justify-content-between align-items-center">
      <p-button variant="text" label="Cancelar" icon="pi pi-undo" iconPos="right" severity="danger" (onClick)="confirmationReturn()"></p-button>
      <p-button variant="text" label="Salvar" icon="pi pi-send" iconPos="right" severity="success" (onClick)="save()" [disabled]="!canSave()"></p-button>
    </div>
  </ng-template>
</p-card>
