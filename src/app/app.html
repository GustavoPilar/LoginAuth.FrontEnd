<ngx-spinner bdColor = "rgba(0, 0, 0, 0.8)" size = "medium" color = "#fff" type = "ball-atom" [fullScreen] = "true"></ngx-spinner>

<div class="w-full w-11 m-auto" style="max-width: 80rem;">
  @if (settings.showMenu) {
    <app-menu></app-menu>
  }

  @if (settings.showBreadCrumb) {
    <p-breadcrumb [model]="settings.breadCrumbItems" [home]="breadCumbHome"></p-breadcrumb>
  }


  <router-outlet />


  @if (settings.showCreatedBy) {
    <app-created-by></app-created-by>
  }
</div>
